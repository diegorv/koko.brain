name: Privacy Check

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "src-tauri/src/**"
  pull_request:
    branches: [main]
    paths:
      - "src/**"
      - "src-tauri/src/**"

concurrency:
  group: privacy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  scan-external-calls:
    name: Scan for External Calls
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - name: Scan TypeScript files for external calls
        run: |
          echo "Scanning .ts/.svelte files for external network calls..."
          PATTERNS=(
            'new URL\s*\('
            'fetch\s*\('
            'XMLHttpRequest'
            'navigator\.sendBeacon'
            'WebSocket\s*\('
            'EventSource\s*\('
            'http:\/\/'
            'https:\/\/'
            '\.open\s*\(\s*["\x27](?:GET|POST|PUT|DELETE|PATCH)'
          )

          SKIP=(
            '\.test\.ts'
            '\.spec\.ts'
            'node_modules'
            '\.d\.ts$'
            'localhost'
            '127\.0\.0\.1'
            'tauri\.localhost'
            '# privacy-ok'
            '// privacy-ok'
          )

          # Known expected external calls (shown as notice, don't fail the build)
          KNOWN=(
            'cdn\.jsdelivr\.net/npm/chart\.js'
            'xmlns="http://www\.w3\.org'
            'data:image/svg\+xml'
            'openUrl\('
          )

          FOUND=0
          KNOWN_FOUND=0
          for pattern in "${PATTERNS[@]}"; do
            while IFS= read -r match; do
              SKIP_MATCH=false
              for skip in "${SKIP[@]}"; do
                if echo "$match" | grep -qE "$skip"; then
                  SKIP_MATCH=true
                  break
                fi
              done
              if [ "$SKIP_MATCH" = true ]; then
                continue
              fi

              IS_KNOWN=false
              for known in "${KNOWN[@]}"; do
                if echo "$match" | grep -qE "$known"; then
                  IS_KNOWN=true
                  break
                fi
              done

              if [ "$IS_KNOWN" = true ]; then
                echo "::notice::$match"
                KNOWN_FOUND=$((KNOWN_FOUND + 1))
              else
                echo "::warning::$match"
                FOUND=$((FOUND + 1))
              fi
            done < <(grep -rnE "$pattern" --include='*.ts' --include='*.svelte' --include='*.js' . 2>/dev/null || true)
          done

          if [ "$KNOWN_FOUND" -gt 0 ]; then
            echo ""
            echo "Found $KNOWN_FOUND known external call(s) (expected, not blocking)."
          fi

          if [ "$FOUND" -gt 0 ]; then
            echo ""
            echo "Found $FOUND unknown external call(s) in TypeScript/Svelte files."
            echo "If a call is intentional, add it to the KNOWN list in this workflow or add '// privacy-ok' on the same line."
            exit 1
          fi
          echo "No unknown external calls found in TypeScript/Svelte files."

      - name: Scan Rust files for external calls
        run: |
          echo "Scanning .rs files for external network calls..."
          PATTERNS=(
            'reqwest'
            'hyper::client'
            'surf::'
            'ureq::'
            'curl::'
            'TcpStream::connect'
            'UdpSocket::connect'
            'http:\/\/'
            'https:\/\/'
          )

          SKIP=(
            '_test\.rs'
            'tests/'
            'target/'
            'localhost'
            '127\.0\.0\.1'
            '# privacy-ok'
            '// privacy-ok'
          )

          # Known expected external calls (shown as notice, don't fail the build)
          KNOWN=(
            'huggingface\.co/Xenova/bge-m3'
            'semantic/model\.rs.*reqwest'
          )

          FOUND=0
          KNOWN_FOUND=0
          for pattern in "${PATTERNS[@]}"; do
            while IFS= read -r match; do
              SKIP_MATCH=false
              for skip in "${SKIP[@]}"; do
                if echo "$match" | grep -qE "$skip"; then
                  SKIP_MATCH=true
                  break
                fi
              done
              if [ "$SKIP_MATCH" = true ]; then
                continue
              fi

              IS_KNOWN=false
              for known in "${KNOWN[@]}"; do
                if echo "$match" | grep -qE "$known"; then
                  IS_KNOWN=true
                  break
                fi
              done

              if [ "$IS_KNOWN" = true ]; then
                echo "::notice::$match"
                KNOWN_FOUND=$((KNOWN_FOUND + 1))
              else
                echo "::warning::$match"
                FOUND=$((FOUND + 1))
              fi
            done < <(grep -rnE "$pattern" --include='*.rs' . 2>/dev/null || true)
          done

          if [ "$KNOWN_FOUND" -gt 0 ]; then
            echo ""
            echo "Found $KNOWN_FOUND known external call(s) (expected, not blocking)."
          fi

          if [ "$FOUND" -gt 0 ]; then
            echo ""
            echo "Found $FOUND unknown external call(s) in Rust files."
            echo "If a call is intentional, add it to the KNOWN list in this workflow or add '// privacy-ok' on the same line."
            exit 1
          fi
          echo "No unknown external calls found in Rust files."
